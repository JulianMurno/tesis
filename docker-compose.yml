services:
  postgres:
    image: postgres:15
    container_name: mentorit_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: mentorit
      POSTGRES_PASSWORD: password
      POSTGRES_DB: mentorit_db
    ports:
      # Host 5433 → contenedor 5432 (evita choque con un PostgreSQL ya instalado en Windows).
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
